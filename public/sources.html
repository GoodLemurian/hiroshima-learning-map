<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ひろしま地域学習マップで使用しているデータの出典一覧です。" />
    <title>出典 | ひろしま地域学習マップ</title>
    <style>
      :root {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #213547;
        background: #f5f8f7;
      }

      * { box-sizing: border-box; }

      body { margin: 0; }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 24px;
        color: #174438;
        font-size: clamp(1.7rem, 5vw, 2.4rem);
      }

      ul {
        display: grid;
        gap: 16px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      li {
        padding: 20px;
        border: 1px solid #c8d2ce;
        border-radius: 10px;
        background: #fff;
      }

      strong { display: block; margin-bottom: 6px; }

      a { color: #075c9e; }

      .license {
        margin: 6px 0 0;
        color: #52625d;
        font-size: 0.9rem;
      }

      .back-link { display: inline-block; margin-top: 28px; }
    </style>
  </head>
  <body>
    <main>
      <h1>出典</h1>
      <ul>
        <li>
          <strong>背景地図</strong>
          <a href="https://maps.gsi.go.jp/development/ichiran.html">国土地理院</a>
        </li>
        <li>
          <strong>標高</strong>
          <a href="https://tiles.gsj.jp/tiles/elev/tiles.html">産総研地質調査総合センター</a>
        </li>
        <li>
          <strong>統計</strong>
          <a href="https://www.city.hiroshima.lg.jp/shisei/toukei/1027844/1027845/1027846/1038153/index.html">広島市 年齢別人口（区役所別）</a>
          <p class="license">2026年5月31日、CC BY 2.1 JP</p>
        </li>
        <li>
          <strong>区画漁業権</strong>
          <a href="https://portal.msil.go.jp/">海洋状況表示システム（海しる）API（海上保安庁）</a>
          <p class="license">このサービスは、海しるAPIを利用して取得した情報をもとに作成していますが、サービスの内容は海上保安庁によって保証されたものではありません。</p>
        </li>
      </ul>
      <a class="back-link" href="/">地図に戻る</a>
    </main>
  </body>
</html>
